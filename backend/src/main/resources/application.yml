server:
  port: 8080

spring:
  application:
    name: seven-eleven-retail
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:x}
    username: ${SPRING_DATASOURCE_USERNAME:x}
    password: ${SPRING_DATASOURCE_PASSWORD:x}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: user_schema, product_schema, order_schema

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

app:
  jwt:
    secret: ${JWT_SECRET:x}
    expiration-ms: 86400000 # 24 hours
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:x}
    api-key: ${CLOUDINARY_API_KEY:x}
    api-secret: ${CLOUDINARY_API_SECRET:x}
  payos:
    client-id: ${PAYOS_CLIENT_ID:x}
    api-key: ${PAYOS_API_KEY:x}
    checksum-key: ${PAYOS_CHECKSUM_KEY:x}

logging:
  level:
    com.sevenelevenvn: INFO
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
